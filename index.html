<body>
    <div id="myInfo">Данные по обновлению</div>
    <input  id="input_" type="text">
    <a href="./nbv.html"></a>

    <script>

        //fetch('https://nbvtim.github.io/work/SOURS/all.json').then(function(res){return res.json()}).then(function(data){c(data)})
        window.addEventListener('load', function(){
            let c = console.log    

            let xhr = new XMLHttpRequest()
            xhr.open("GET", "https://nbvtim.github.io/work/db.json", false) // данные берутся с сервера, возможна задержка 
            xhr.send()
            
            let db = JSON.parse(xhr.response)[0].data

            let dateLoad = JSON.parse(xhr.response)[2]
            function nbv(){
                dateMs = Date.now() - dateLoad
                s = Math.floor(dateMs/1000)
                m = Math.floor(dateMs/1000/60)
                h = Math.floor(dateMs/1000/60/60)
                d = Math.floor(dateMs/1000/60/60/24)
                mass1 = [ d,  h,  m,  s]
                mass2 = ["дней", "часов", "минут", "секунд"]
                for(i in mass1){
                    if(mass1[i] > 0){
                        return `${mass1[i]} ${mass2[i]} назад`
                    }
                }
            }

            myInfo.innerHTML = `Обновленно: ${new Date(dateLoad).toLocaleString()}; ${nbv()}`
            input_.placeholder = JSON.parse(xhr.response)[0].name

            let div = document.createElement("div")

            input_.addEventListener('input', function(){
                let table = ""
                let arr = []

                //делаем массив значений
                for (i in db) {
                    let index = db[i].join(",").toUpperCase().indexOf(input_.value.toUpperCase())
                    if(index != -1 && input_.value != ""){
                        arr.push(db[i])
                    }
                }
                for(i in arr){
                    for(j in arr[i]){
                        if(arr[i][j] === null){
                            arr[i][j] = ""
                        }
                    }
                }
                //формируем HTML таблицу
                table = "<table><tbody>"
                // table += "<tr>"
                // for (let i = 0; i < db[0].length; i++) {
                //     table += "<th>"+db[0][i]+"</th>"
                // }
                // table += "</tr>"
                for (let i = 0; i < arr.length; i++) {
                    table += "<tr>"
                    for (let j = 0; j < arr[i].length; j++) {
                        table += "<td>"+arr[i][j]+"</td>"
                    }
                    table += "</tr>"
                }
                table += "</tbody></table>"
                //вставляем таблицу в документ
                div.innerHTML = ""
                document.body.append(div)
                div.innerHTML = table
                document.body.append(div)
                if(arr.length === 0){
                    div.style.display = "none"
                }else{
                    div.style.display = "block"
                } 
            })
