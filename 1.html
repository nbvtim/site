<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./favicon.svg"> 
    <!-- <link rel="stylesheet" href="./SOURS/index.css"> -->
    <style>

    </style>
    <title>nbv &#127759;</title>
</head>
<body>
    <script>
        window.addEventListener('load', function(){
            let c = console.log    

            let xhr = new XMLHttpRequest()
            xhr.open("GET", "https://nbvtim.github.io/work/db.json", false) 
            xhr.send()
            let db = JSON.parse(xhr.response)

            pre = document.createElement("pre")
            document.body.append(pre)

            for(i in db){
                if(db[i].name){
                    input = document.createElement("input")
                    input.placeholder = db[i].name
                    document.body.prepend(input)
                }
            }
            document.addEventListener("click", function(e){
                e.target.value = ""
                if(e.target.placeholder){
                    let mass
                    for(i in db){
                        if(db[i].name == e.target.placeholder){
                            mass = db[i].data
                        }
                    }
                    e.target.addEventListener("input", function(){
                        arr = []
                        for(i in mass){
                            index = mass[i].join(", ").toLowerCase().indexOf(e.target.value.toLowerCase())
                            if(index != -1 && e.target.value != ""){
                                arr.push(mass[i])
                            }                            
                        }                      
                        pre.innerText = JSON.stringify(arr,null,4)
                    })    
                }
            })
        })
    </script>

</body>
</html>
